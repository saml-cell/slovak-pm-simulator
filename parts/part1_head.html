<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premiér SR Simulátor</title>
<style>
/* ====== FONTS (system fallbacks) ====== */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

/* ====== CSS RESET & BASE ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f3f8;
  color: #1a1a2e;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ====== CSS VARIABLES ====== */
:root {
  --blue: #0b4ea2;
  --blue-dark: #0b1930;
  --blue-light: #1a6fd4;
  --red: #ee1c25;
  --red-dark: #c41920;
  --white: #ffffff;
  --gold: #c9a84c;
  --gold-light: #e0c76e;
  --bg: #f0f3f8;
  --bg-card: #ffffff;
  --text: #1a1a2e;
  --text-light: #555;
  --text-muted: #888;
  --border: #dde3ed;
  --shadow: 0 2px 12px rgba(11,30,48,0.08);
  --shadow-lg: 0 8px 32px rgba(11,30,48,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}

/* ====== ANIMATIONS ====== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInFast {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 8px rgba(238,28,37,0.3); }
  50% { box-shadow: 0 0 24px rgba(238,28,37,0.6); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes barFill {
  from { width: 0; }
}
@keyframes countUp {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

.animate-in { animation: fadeIn 0.5s ease-out both; }
.animate-slide-up { animation: slideUp 0.6s ease-out both; }

/* ====== SCREENS ====== */
.screen {
  display: none;
  min-height: 100vh;
}
.screen.active {
  display: block;
  animation: fadeInFast 0.35s ease-out;
}

/* ====== TITLE SCREEN ====== */
#titleScreen {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 50%, var(--blue-dark) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}
#titleScreen::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5l5 15h15l-12 9 5 15-13-10-13 10 5-15-12-9h15z' fill='%23c9a84c' fill-opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.5;
}
.title-content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 2rem;
}
.title-emblem {
  width: 120px;
  height: 120px;
  margin: 0 auto 1.5rem;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  box-shadow: 0 0 40px rgba(201,168,76,0.3);
}
.title-main {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 3.2rem;
  font-weight: 900;
  color: var(--white);
  text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  margin-bottom: 0.5rem;
  line-height: 1.1;
}
.title-sub {
  font-size: 1.3rem;
  color: var(--gold);
  font-weight: 300;
  margin-bottom: 0.25rem;
}
.title-period {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 2rem;
}
.title-desc {
  max-width: 500px;
  margin: 0 auto 2.5rem;
  color: rgba(255,255,255,0.7);
  font-size: 0.95rem;
  line-height: 1.6;
}

/* ====== BUTTONS ====== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  color: var(--white);
  box-shadow: 0 4px 16px rgba(238,28,37,0.3);
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(238,28,37,0.4); }

.btn-start {
  padding: 1rem 3rem;
  font-size: 1.2rem;
  animation: pulse 2s infinite;
  border-radius: var(--radius);
}
.btn-start:hover { animation: none; }

.btn-secondary {
  background: var(--white);
  color: var(--blue);
  border: 2px solid var(--blue);
}
.btn-secondary:hover { background: var(--blue); color: var(--white); }

.btn-ghost {
  background: rgba(255,255,255,0.1);
  color: var(--white);
  border: 1px solid rgba(255,255,255,0.2);
}
.btn-ghost:hover { background: rgba(255,255,255,0.2); }

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: var(--blue-dark);
}

.btn-danger {
  background: linear-gradient(135deg, #dc3545, #c82333);
  color: white;
}

.btn-success {
  background: linear-gradient(135deg, #28a745, #218838);
  color: white;
}

.btn-warning {
  background: linear-gradient(135deg, #ffc107, #e0a800);
  color: #1a1a2e;
}

.btn-small {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem;
}

.btn-block {
  display: flex;
  width: 100%;
  justify-content: center;
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}

/* ====== SETTINGS MODAL ====== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--white);
  border-radius: var(--radius);
  padding: 2rem;
  max-width: 500px;
  width: 90%;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s ease-out;
}
.modal h2 {
  font-family: 'Playfair Display', Georgia, serif;
  margin-bottom: 1rem;
  color: var(--blue);
}
.modal label {
  display: block;
  font-weight: 600;
  margin-bottom: 0.3rem;
  font-size: 0.9rem;
}
.modal input[type="password"],
.modal input[type="text"] {
  width: 100%;
  padding: 0.7rem 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  margin-bottom: 1rem;
  transition: var(--transition);
  font-family: 'JetBrains Mono', monospace;
}
.modal input:focus {
  border-color: var(--blue);
  outline: none;
  box-shadow: 0 0 0 3px rgba(11,78,162,0.1);
}
.modal-buttons {
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
  margin-top: 1rem;
}
.modal .hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

/* ====== HEADER ====== */
.game-header {
  background: linear-gradient(135deg, var(--blue-dark), var(--blue));
  color: var(--white);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.header-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 700;
}
.header-month {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--gold);
  background: rgba(255,255,255,0.1);
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.header-stat {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  font-size: 0.8rem;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
}
.header-stat.approval { background: rgba(40,167,69,0.2); color: #7ddf9b; }
.header-stat.stability { background: rgba(0,123,255,0.2); color: #80bdff; }
.header-stat.coalition { background: rgba(255,193,7,0.2); color: #ffe180; }
.header-stat.critical { background: rgba(238,28,37,0.3); color: #ff8a8a; animation: pulseGlow 1.5s infinite; }
.header-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 0.3rem 0.6rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: var(--transition);
}
.header-btn:hover { background: rgba(255,255,255,0.2); }

/* ====== MAIN CONTENT AREA ====== */
.game-content {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}
.game-content-wide {
  max-width: 1400px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* ====== CARDS ====== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.card:hover {
  box-shadow: var(--shadow-lg);
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 2px solid var(--bg);
}
.card-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--blue);
}
.card-badge {
  font-size: 0.75rem;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  font-weight: 600;
}

/* ====== METRIC BARS ====== */
.metric-bar-container {
  margin-bottom: 0.75rem;
}
.metric-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-bottom: 0.3rem;
}
.metric-bar-label span:first-child { font-weight: 600; }
.metric-bar-label span:last-child {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
}
.metric-bar {
  height: 10px;
  background: #e9ecef;
  border-radius: 5px;
  overflow: hidden;
}
.metric-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.8s ease-out;
  animation: barFill 0.8s ease-out;
}
.metric-bar-fill.green { background: linear-gradient(90deg, #28a745, #34ce57); }
.metric-bar-fill.yellow { background: linear-gradient(90deg, #ffc107, #ffcd39); }
.metric-bar-fill.red { background: linear-gradient(90deg, #dc3545, #e4606d); }
.metric-bar-fill.blue { background: linear-gradient(90deg, var(--blue), var(--blue-light)); }

/* ====== GRID LAYOUTS ====== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }

/* ====== DASHBOARD SCREEN ====== */
.dash-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.dash-metric-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 1.25rem;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.dash-metric-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
}
.dash-metric-card.approval::before { background: linear-gradient(90deg, #28a745, #34ce57); }
.dash-metric-card.stability::before { background: linear-gradient(90deg, var(--blue), var(--blue-light)); }
.dash-metric-card.coalition::before { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
.dash-metric-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.5rem;
  font-weight: 700;
  line-height: 1;
  margin: 0.5rem 0;
}
.dash-metric-label {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dash-metric-delta {
  font-size: 0.8rem;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 0.3rem;
}
.delta-up { color: #28a745; }
.delta-down { color: #dc3545; }
.delta-neutral { color: var(--text-muted); }

.dash-nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin-top: 1.5rem;
}
.dash-nav-btn {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 1rem;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  font-family: 'Inter', sans-serif;
}
.dash-nav-btn:hover {
  border-color: var(--blue);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.dash-nav-btn .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
.dash-nav-btn .nav-label { font-size: 0.8rem; font-weight: 600; color: var(--text); }

.dash-proceed {
  text-align: center;
  margin-top: 1.5rem;
}

/* ====== EVENT SCREEN ====== */
.event-card {
  max-width: 800px;
  margin: 0 auto;
}
.event-tier {
  display: inline-block;
  padding: 0.2rem 0.8rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.tier-situation { background: #e3f2fd; color: #1565c0; }
.tier-crisis { background: #fce4ec; color: #c62828; }
.tier-open { background: #e8f5e9; color: #2e7d32; }
.tier-consequence { background: #fff3e0; color: #e65100; }
.event-headline {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.8rem;
  font-weight: 900;
  margin: 1rem 0;
  line-height: 1.2;
  color: var(--blue-dark);
}
.event-description {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 1rem;
}
.event-context {
  background: var(--bg);
  padding: 1rem;
  border-radius: var(--radius-sm);
  margin-bottom: 1.5rem;
  border-left: 4px solid var(--gold);
  font-size: 0.9rem;
  color: var(--text-light);
}
.event-input-area {
  margin-top: 1.5rem;
}
.event-input-area label {
  display: block;
  font-weight: 700;
  margin-bottom: 0.5rem;
  font-size: 1rem;
}
.event-textarea {
  width: 100%;
  min-height: 120px;
  padding: 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: 'Inter', sans-serif;
  resize: vertical;
  transition: var(--transition);
  line-height: 1.5;
}
.event-textarea:focus {
  border-color: var(--blue);
  outline: none;
  box-shadow: 0 0 0 3px rgba(11,78,162,0.1);
}
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.75rem;
  margin-bottom: 1rem;
}
.suggestion-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 0.4rem 0.9rem;
  border-radius: 20px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
}
.suggestion-chip:hover {
  background: var(--blue);
  color: white;
  border-color: var(--blue);
}

/* ====== ANALYSIS SCREEN ====== */
.analysis-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.score-card {
  text-align: center;
  padding: 1.5rem;
}
.score-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  animation: countUp 0.5s ease-out;
}
.score-label {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 0.3rem;
}
.press-headline {
  padding: 0.75rem;
  border-left: 3px solid var(--blue);
  margin-bottom: 0.75rem;
  background: var(--bg);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.press-outlet {
  font-weight: 700;
  font-size: 0.8rem;
  color: var(--text-muted);
}
.press-text {
  font-size: 0.9rem;
  margin-top: 0.2rem;
  font-style: italic;
}
.checks-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem;
  border-radius: var(--radius-sm);
  margin-bottom: 0.5rem;
}
.checks-item.passed { background: #e8f5e9; }
.checks-item.blocked { background: #fce4ec; }
.checks-item.partial { background: #fff3e0; }
.checks-icon { font-size: 1.3rem; }
.checks-text { font-size: 0.9rem; }
.implementation-rate {
  text-align: center;
  padding: 1rem;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-top: 1rem;
}
.impl-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--blue);
}

/* ====== FOCUS GROUP SCREEN ====== */
.persona-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 0.75rem;
}
.persona-card {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
  transition: var(--transition);
}
.persona-card:hover { box-shadow: var(--shadow); }
.persona-emoji { font-size: 2rem; flex-shrink: 0; }
.persona-info { flex: 1; min-width: 0; }
.persona-name { font-weight: 700; font-size: 0.9rem; }
.persona-demo { font-size: 0.75rem; color: var(--text-muted); }
.persona-score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  margin-top: 0.2rem;
  display: inline-block;
}
.persona-quote {
  font-size: 0.8rem;
  font-style: italic;
  color: var(--text-light);
  margin-top: 0.3rem;
  line-height: 1.4;
}
.score-very-positive { background: #c8e6c9; color: #2e7d32; }
.score-positive { background: #dcedc8; color: #558b2f; }
.score-neutral { background: #fff9c4; color: #f57f17; }
.score-negative { background: #ffccbc; color: #bf360c; }
.score-very-negative { background: #ffcdd2; color: #c62828; }

/* ====== STAKEHOLDER SCREEN ====== */
.stakeholder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.75rem;
}
.stakeholder-card {
  padding: 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg-card);
}
.stakeholder-name { font-weight: 700; font-size: 0.9rem; }
.stakeholder-desc { font-size: 0.75rem; color: var(--text-muted); }
.stakeholder-type {
  font-size: 0.7rem;
  padding: 0.1rem 0.5rem;
  border-radius: 10px;
  display: inline-block;
  margin-top: 0.2rem;
}
.type-coalition { background: #e3f2fd; color: #1565c0; }
.type-opposition { background: #fce4ec; color: #c62828; }
.type-media { background: #f3e5f5; color: #6a1b9a; }
